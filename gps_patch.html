<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.R. Carrozas · Centro de Control GPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:      #f5f6f8;
  --surface: #ffffff;
  --border:  #e2e5ea;
  --accent:  #e63946;
  --accent2: #c1121f;
  --green:   #0b9e8e;
  --yellow:  #d4930a;
  --text:    #1a1d23;
  --muted:   #6b7280;
  --card:    #ffffff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{display:flex;align-items:center;gap:14px;padding:11px 18px;background:var(--surface);border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0;flex-wrap:wrap}
.logo-block{display:flex;flex-direction:column;line-height:1}
.logo-brand{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.5px}
.logo-brand span{color:var(--accent)}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.header-spacer{flex:1}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(11,158,142,.1);border:1px solid rgba(11,158,142,.35);border-radius:20px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--green);font-weight:500}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stat-chips{display:flex;gap:8px}
.stat-chip{padding:5px 11px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--card)}
.stat-chip.active{border-color:rgba(230,57,70,.4);color:var(--accent2)}
.stat-chip.idle{color:var(--muted)}
.demo-badge{background:rgba(212,147,10,.12);border:1px solid rgba(212,147,10,.35);border-radius:20px;padding:5px 11px;font-family:'DM Mono',monospace;font-size:10px;color:var(--yellow);display:none;align-items:center;gap:5px}
.demo-badge.visible{display:flex}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{width:296px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;display:flex;align-items:center;gap:5px}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.spin{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.vehicle-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.vehicle-list::-webkit-scrollbar{width:4px}
.vehicle-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* VEHICLE CARD */
.vcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.vcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:0;transition:opacity .2s}
.vcard:hover,.vcard.selected{background:#fff8f8}
.vcard:hover::before,.vcard.selected::before{opacity:1}
.vcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.vcard-plate{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px}
.status-pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.status-pill.en-ruta{background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.35);color:var(--accent2)}
.status-pill.offline{background:rgba(107,114,128,.1);border:1px solid rgba(107,114,128,.2);color:var(--muted)}
.vcard-driver{font-size:12px;color:var(--muted);margin-bottom:5px}
.vcard-service{font-size:11px;color:var(--text);opacity:.8;margin-bottom:9px}
.vcard-coords{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);background:rgba(11,158,142,.07);padding:5px 8px;border-radius:5px;margin-bottom:7px;display:flex;gap:7px;align-items:center}
.coord-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.trail-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;margin-bottom:8px;display:inline-block}
.vcard-meta{display:flex;justify-content:space-between;align-items:flex-end}
.vcard-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.vcard-precision{font-family:'DM Mono',monospace;font-size:9px;color:var(--yellow);margin-top:2px}
.btn-row{display:flex;gap:4px}
.btn-small{font-family:'DM Mono',monospace;font-size:9px;padding:4px 9px;border-radius:5px;cursor:pointer;transition:all .2s;letter-spacing:.4px;text-transform:uppercase;border:1px solid}
.btn-center{background:rgba(230,57,70,.1);border-color:rgba(230,57,70,.25);color:var(--accent2)}
.btn-center:hover{background:rgba(230,57,70,.2)}
.btn-trail-on{background:rgba(11,158,142,.08);border-color:rgba(11,158,142,.25);color:var(--green)}
.btn-trail-on:hover{background:rgba(11,158,142,.18)}
.btn-trail-off{background:rgba(107,114,128,.07);border-color:rgba(107,114,128,.2);color:var(--muted)}
.btn-trail-off:hover{background:rgba(107,114,128,.14)}

/* COUNTDOWN */
.countdown-bar{padding:9px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.countdown-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.countdown-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear}

/* MAP */
#map{flex:1;background:#0d1117}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-attribution{display:none!important}
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:10px!important;color:var(--text)!important;box-shadow:0 8px 32px rgba(0,0,0,.12)!important}
.leaflet-popup-tip{background:var(--surface)!important}
.leaflet-popup-content{margin:13px 15px!important;min-width:190px}
.popup-plate{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px}
.popup-driver{font-size:12px;color:var(--muted);margin-bottom:8px}
.popup-row{display:flex;justify-content:space-between;margin-bottom:4px;gap:8px}
.popup-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap}
.popup-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);text-align:right}
.popup-divider{border:none;border-top:1px solid var(--border);margin:7px 0}

/* TOAST */
#toast-container{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:7px;z-index:9999}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);padding:10px 15px;border-radius:8px;font-size:12px;max-width:260px;animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.toast.warn{border-left-color:var(--yellow)}
.toast.error{border-left-color:var(--accent)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;padding:38px 18px;gap:11px;color:var(--muted)}
.empty-state .icon{font-size:38px;opacity:.4}
.empty-state p{font-size:12px;text-align:center;line-height:1.6}

/* PULSE ANIMATION */
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}}
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-brand"><span>J.R.</span> Carrozas</div>
    <div class="logo-sub">Centro de Control · GPS en Vivo</div>
  </div>
  <div class="header-spacer"></div>
  <div class="demo-badge" id="demo-badge">⚠ DEMO</div>
  <div class="stat-chips">
    <div class="stat-chip active" id="chip-active">● 0 en ruta</div>
    <div class="stat-chip idle"   id="chip-idle">○ 0 sin señal</div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span id="live-label">EN VIVO</span>
  </div>
</header>

<div class="app-body">
  <aside>
    <div class="sidebar-header">
      <span class="sidebar-title">Vehículos</span>
      <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
        <svg id="refresh-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Actualizar
      </button>
    </div>
    <div class="vehicle-list" id="vehicle-list">
      <div class="empty-state">
        <div class="icon">🛰️</div>
        <p>Cargando posiciones GPS…</p>
      </div>
    </div>
    <div class="countdown-bar">
      <span>próxima</span>
      <div class="countdown-track">
        <div class="countdown-fill" id="countdown-fill" style="width:100%"></div>
      </div>
      <span id="countdown-secs">20s</span>
    </div>
  </aside>
  <div id="map"></div>
</div>

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const CFG = {
  REFRESH_MS:     20_000,
  CENTER:         [-4.535, -75.674],
  ZOOM:           13,
  STALE_MIN:      5,
  TRAIL_COLORS:   ['#e63946','#2a9d8f','#f4a261','#8338ec','#fb8500','#e9c46a'],
};

const URL_GAS = "https://script.google.com/macros/s/AKfycbx9wr5Od2WgVF2vSSW93OcMmxDoSXs3PLaE7jo44j4rUFElagX4OKNDRy9mqjPpJZWZ/exec";

// ═══════════════════════════════════════════════════
//  GASGET — fetch de hoja
// ═══════════════════════════════════════════════════
async function gasGet(sheetName) {
  try {
    const r = await fetch(`${URL_GAS}?sheetName=${encodeURIComponent(sheetName)}`, { redirect: 'follow' });
    if (!r.ok) return [];
    const j = await r.json();
    if (j && j.error) { console.warn('gasGet', sheetName, j.error); return []; }
    return Array.isArray(j) ? j : [];
  } catch (e) { console.warn('gasGet', sheetName, e.message); return []; }
}

// ═══════════════════════════════════════════════════
//  ESTADO
//  vehicles[id] = {
//    latest, allPoints[], marker, polyline,
//    startDot, showTrail, color, extra
//  }
// ═══════════════════════════════════════════════════
const ST = {
  vehicles:  {},
  traslados: {},
  selected:  null,
  countdown: CFG.REFRESH_MS / 1000,
  timer: null, cTimer: null,
  colorIdx: 0,
  demoMode: false,
};

// ═══════════════════════════════════════════════════
//  MAPA
// ═══════════════════════════════════════════════════
const map = L.map('map', { center: CFG.CENTER, zoom: CFG.ZOOM, preferCanvas: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { subdomains: 'abcd', maxZoom: 19 }).addTo(map);

// ═══════════════════════════════════════════════════
//  ICONO MARCADOR
// ═══════════════════════════════════════════════════
function makeIcon(plate, stale, color) {
  const c = stale ? '#6b7280' : color;
  const s = stale ? 'rgba(107,114,128,.35)' : `${color}99`;
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;display:flex;flex-direction:column;align-items:center">
      ${!stale ? `<div style="position:absolute;width:58px;height:58px;border-radius:50%;background:${c}2e;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 2s ease-out infinite;pointer-events:none"></div>` : ''}
      <div style="width:38px;height:38px;background:${c};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:3px solid #fff;box-shadow:0 3px 14px ${s};z-index:1">🚗</div>
      <div style="background:rgba(10,12,16,.88);color:#fff;font-family:monospace;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:3px;border:1px solid ${c};letter-spacing:.5px;white-space:nowrap">${plate || '—'}</div>
    </div>`,
    iconSize: [38, 56], iconAnchor: [19, 28], popupAnchor: [0, -30],
  });
}

// ═══════════════════════════════════════════════════
//  DEMO DATA
// ═══════════════════════════════════════════════════
let _dA = 0;
function getDemoData() {
  _dA += 0.018;
  const b = { lat: -4.535, lng: -75.674 };
  const now = Date.now();
  const rows = { live: [], hist: [] };
  // Vehículo 1
  rows.live.push({ id_salida:'S-001', placa:'ICQ 333', conductor:'Záidar J. Buitragoa', servicio:'Jardines de Armenia',
    lat: String(b.lat + Math.sin(_dA) * 0.015), lng: String(b.lng + Math.cos(_dA) * 0.015),
    precision: '8', timestamp: new Date().toISOString() });
  for (let i = 12; i >= 0; i--) {
    const a = _dA - i * 0.025;
    rows.hist.push({ id_salida:'S-001', placa:'ICQ 333',
      lat: String(b.lat + Math.sin(a) * 0.015), lng: String(b.lng + Math.cos(a) * 0.015),
      precision: '8', timestamp: new Date(now - i * 18000).toISOString() });
  }
  // Vehículo 2
  rows.live.push({ id_salida:'S-002', placa:'ABC 789', conductor:'Carlos Medina', servicio:'Parque Memorial',
    lat: String(b.lat + Math.sin(_dA + 2) * 0.012), lng: String(b.lng + Math.cos(_dA + 2) * 0.012),
    precision: '12', timestamp: new Date(Date.now() - 8 * 60000).toISOString() });
  for (let i = 8; i >= 0; i--) {
    const a = _dA - i * 0.03 + 2;
    rows.hist.push({ id_salida:'S-002', placa:'ABC 789',
      lat: String(b.lat + Math.sin(a) * 0.012), lng: String(b.lng + Math.cos(a) * 0.012),
      precision: '12', timestamp: new Date(now - i * 22000 - 8 * 60000).toISOString() });
  }
  return rows;
}

// ═══════════════════════════════════════════════════
//  CACHE TRASLADOS
// ═══════════════════════════════════════════════════
async function loadTraslados() {
  const rows = await gasGet('Traslado');
  ST.traslados = {};
  rows.forEach(t => {
    const id = String(t.id_salida || '').trim();
    if (id) ST.traslados[id] = { conductor: t.conductor || '', servicio: t.motivo_de_salida || t.servicio || '' };
  });
}

function enrich(row) {
  const id = String(row.id_salida || '').trim();
  const ex = ST.traslados[id] || {};
  return { ...row, conductor: row.conductor || ex.conductor || 'Desconocido', servicio: row.servicio || ex.servicio || '—' };
}

// ═══════════════════════════════════════════════════
//  FETCH GPS — lee gps_live + gps_historial en paralelo
// ═══════════════════════════════════════════════════
async function fetchGPS() {
  try {
    const [liveRows, histRows] = await Promise.all([
      gasGet('gps_live'),
      gasGet('gps_historial'),
    ]);

    if (!liveRows.length) throw new Error('empty');

    ST.demoMode = false;
    document.getElementById('demo-badge').classList.remove('visible');

    // Construir mapa de historial agrupado por id_salida
    const histMap = {};
    histRows.forEach(r => {
      const id  = String(r.id_salida || '').trim();
      const lat = parseFloat(r.lat);
      const lng = parseFloat(r.lng);
      if (!id || isNaN(lat) || isNaN(lng)) return;
      if (!histMap[id]) histMap[id] = [];
      histMap[id].push({ lat, lng, timestamp: r.timestamp || '' });
    });
    // Ordenar por timestamp ASC
    Object.values(histMap).forEach(arr =>
      arr.sort((a, b) => new Date(a.timestamp || 0) - new Date(b.timestamp || 0))
    );

    // Construir resultado: { id: { latest, points[] } }
    const result = {};
    liveRows.forEach(raw => {
      const row = enrich(raw);
      const id  = String(row.id_salida || '').trim();
      const lat = parseFloat(row.lat);
      const lng = parseFloat(row.lng);
      if (!id || isNaN(lat) || isNaN(lng)) return;

      // El historial incluye la posición actual también; si no existe, usar solo el punto live
      const points = histMap[id] && histMap[id].length
        ? histMap[id]
        : [{ lat, lng, timestamp: row.timestamp || '' }];

      result[id] = { latest: { ...row, lat, lng }, points };
    });

    return result;

  } catch (e) {
    console.warn('GPS fetch error:', e.message);
    if (!ST.demoMode) {
      ST.demoMode = true;
      document.getElementById('demo-badge').classList.add('visible');
      showToast('Modo DEMO — conecta las hojas gps_live y gps_historial', 'warn');
    }
    // Demo: construir mismo formato
    const d = getDemoData();
    const histMap = {};
    d.hist.forEach(r => {
      const id = r.id_salida;
      if (!histMap[id]) histMap[id] = [];
      histMap[id].push({ lat: parseFloat(r.lat), lng: parseFloat(r.lng), timestamp: r.timestamp });
    });
    Object.values(histMap).forEach(arr =>
      arr.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
    );
    const result = {};
    d.live.forEach(row => {
      const id = row.id_salida;
      result[id] = {
        latest: { ...row, lat: parseFloat(row.lat), lng: parseFloat(row.lng) },
        points: histMap[id] || [{ lat: parseFloat(row.lat), lng: parseFloat(row.lng), timestamp: row.timestamp }],
      };
    });
    return result;
  }
}

// ═══════════════════════════════════════════════════
//  UPDATE MAP
// ═══════════════════════════════════════════════════
function updateMap(grupos) {
  const now = Date.now();
  let active = 0, idle = 0;

  Object.entries(grupos).forEach(([id, { latest, points }]) => {
    const ts    = latest.timestamp ? new Date(latest.timestamp).getTime() : 0;
    const stale = (now - ts) > CFG.STALE_MIN * 60_000;
    stale ? idle++ : active++;

    const latlngs   = points.map(p => L.latLng(p.lat, p.lng));
    const currentLL = L.latLng(latest.lat, latest.lng);

    if (!ST.vehicles[id]) {
      // Primera vez
      const color    = CFG.TRAIL_COLORS[ST.colorIdx++ % CFG.TRAIL_COLORS.length];
      const polyline = L.polyline(latlngs, { color, weight: 3, opacity: .7 }).addTo(map);
      const startDot = latlngs.length > 1
        ? L.circleMarker(latlngs[0], { radius: 5, color: '#fff', fillColor: color, fillOpacity: 1, weight: 2 })
            .addTo(map).bindTooltip('Inicio', { direction: 'top' })
        : null;
      const marker = L.marker(currentLL, { icon: makeIcon(latest.placa || id, stale, color), zIndexOffset: 1000 }).addTo(map);

      ST.vehicles[id] = { latest, points, marker, polyline, startDot, showTrail: true, color };
      bindPopup(id, latest, stale, points.length);

    } else {
      const v = ST.vehicles[id];

      // Agregar solo puntos nuevos (evitar duplicados por timestamp)
      const lastTs = v.points.length ? new Date(v.points[v.points.length - 1].timestamp || 0).getTime() : 0;
      const newPts = points.filter(p => new Date(p.timestamp || 0).getTime() > lastTs);
      if (newPts.length) {
        v.points.push(...newPts);
        if (v.showTrail) {
          v.polyline.setLatLngs(v.points.map(p => L.latLng(p.lat, p.lng)));
        }
      }

      animateMarker(v.marker, v.marker.getLatLng(), currentLL, 1200);
      v.marker.setIcon(makeIcon(latest.placa || id, stale, v.color));
      v.latest = latest;
      bindPopup(id, latest, stale, v.points.length);

      if (ST.selected === id) map.panTo(currentLL, { animate: true, duration: .8 });
    }
  });

  updateChips(active, idle);
  renderSidebar();
}

function animateMarker(marker, from, to, dur) {
  const start = performance.now();
  (function step(now) {
    const t = Math.min(1, (now - start) / dur);
    const e = t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    marker.setLatLng([from.lat + (to.lat - from.lat) * e, from.lng + (to.lng - from.lng) * e]);
    if (t < 1) requestAnimationFrame(step);
  })(performance.now());
}

function bindPopup(id, row, stale, pts) {
  const v   = ST.vehicles[id];
  const age = row.timestamp ? formatAge(new Date(row.timestamp)) : '—';
  const lat = typeof row.lat === 'number' ? row.lat.toFixed(5) : parseFloat(row.lat).toFixed(5);
  const lng = typeof row.lng === 'number' ? row.lng.toFixed(5) : parseFloat(row.lng).toFixed(5);
  v.marker.bindPopup(`
    <div class="popup-plate" style="color:${v.color}">${row.placa || id}</div>
    <div class="popup-driver">${row.conductor || 'Conductor desconocido'}</div>
    <hr class="popup-divider">
    <div class="popup-row"><span class="popup-label">SERVICIO</span><span class="popup-val" style="color:var(--text)">${row.servicio || '—'}</span></div>
    <div class="popup-row"><span class="popup-label">ESTADO</span><span class="popup-val">${stale ? '🔴 Sin señal' : '🟢 En ruta'}</span></div>
    <div class="popup-row"><span class="popup-label">COORDS</span><span class="popup-val">${lat}, ${lng}</span></div>
    <div class="popup-row"><span class="popup-label">PRECISIÓN</span><span class="popup-val" style="color:var(--yellow)">±${Math.round(row.precision || 0)}m</span></div>
    <div class="popup-row"><span class="popup-label">PUNTOS GPS</span><span class="popup-val">${pts} registros</span></div>
    <div class="popup-row"><span class="popup-label">ACTUALIZADO</span><span class="popup-val">${age}</span></div>
  `, { maxWidth: 240 });
}

// ═══════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('vehicle-list');
  const ids  = Object.keys(ST.vehicles);
  if (!ids.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🛰️</div><p>No hay vehículos activos.<br>Verifica la hoja gps_live.</p></div>`;
    return;
  }
  list.innerHTML = ids.map(id => {
    const v     = ST.vehicles[id];
    const row   = v.latest;
    const stale = isStale(row);
    const age   = row.timestamp ? formatAge(new Date(row.timestamp)) : '—';
    const pts   = v.points.length;
    const lat   = typeof row.lat === 'number' ? row.lat.toFixed(5) : parseFloat(row.lat).toFixed(5);
    const lng   = typeof row.lng === 'number' ? row.lng.toFixed(5) : parseFloat(row.lng).toFixed(5);
    const sel   = ST.selected === id ? 'selected' : '';
    const trOn  = v.showTrail;
    return `
    <div class="vcard ${sel}" id="vcard-${id}"
         style="border-color:${sel ? v.color + '55' : 'var(--border)'}"
         onclick="selectVehicle('${id}')">
      <div class="vcard-top">
        <div class="vcard-plate" style="color:${v.color}">${row.placa || id}</div>
        <div class="status-pill ${stale ? 'offline' : 'en-ruta'}">${stale ? 'SIN SEÑAL' : 'EN RUTA'}</div>
      </div>
      <div class="vcard-driver">🧑 ${row.conductor || 'Desconocido'}</div>
      <div class="vcard-service">📍 ${row.servicio || '—'}</div>
      <div class="vcard-coords">
        <div class="coord-dot" style="background:${v.color}"></div>
        ${lat}, ${lng}
      </div>
      <div class="trail-badge"
           style="background:${v.color}18;border:1px solid ${v.color}44;color:${v.color}">
        🛤 ${pts} punto${pts !== 1 ? 's' : ''} de ruta
      </div>
      <div class="vcard-meta">
        <div>
          <div class="vcard-time">⏱ ${age}</div>
          ${row.precision ? `<div class="vcard-precision">±${Math.round(row.precision)}m</div>` : ''}
        </div>
        <div class="btn-row">
          <button class="btn-small ${trOn ? 'btn-trail-on' : 'btn-trail-off'}"
                  onclick="event.stopPropagation();toggleTrail('${id}')">
            ${trOn ? '🛤 ✓' : '🛤 ✗'}
          </button>
          <button class="btn-small btn-center"
                  onclick="event.stopPropagation();centerOn('${id}')">📍 Ir</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateChips(a, i) {
  document.getElementById('chip-active').textContent = `● ${a} en ruta`;
  document.getElementById('chip-idle').textContent   = `○ ${i} sin señal`;
}

function selectVehicle(id) {
  ST.selected = ST.selected === id ? null : id;
  renderSidebar();
  if (ST.selected) centerOn(id);
}

function centerOn(id) {
  const v = ST.vehicles[id];
  if (!v) return;
  if (v.showTrail && v.points.length > 1) {
    const lls = v.points.map(p => L.latLng(p.lat, p.lng));
    map.fitBounds(L.latLngBounds(lls).pad(.15), { animate: true, maxZoom: 16 });
  } else {
    map.flyTo(v.marker.getLatLng(), 15, { animate: true, duration: 1.2 });
  }
  v.marker.openPopup();
}

function toggleTrail(id) {
  const v = ST.vehicles[id];
  if (!v) return;
  v.showTrail = !v.showTrail;
  if (v.showTrail) {
    v.polyline.setLatLngs(v.points.map(p => L.latLng(p.lat, p.lng)));
    v.polyline.addTo(map);
    if (v.startDot) v.startDot.addTo(map);
  } else {
    v.polyline.setLatLngs([]);
    if (v.startDot) v.startDot.remove();
  }
  renderSidebar();
}

// ═══════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════
refresh._cycle = 0;
async function refresh() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spin');

  refresh._cycle++;
  if (refresh._cycle % 5 === 1) await loadTraslados();

  const grupos = await fetchGPS();
  icon.classList.remove('spin');

  if (grupos) updateMap(grupos);

  const t = new Date();
  document.getElementById('live-label').textContent =
    `EN VIVO · ${t.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
  resetCountdown();
}

function resetCountdown() {
  ST.countdown = CFG.REFRESH_MS / 1000;
  clearInterval(ST.cTimer);
  ST.cTimer = setInterval(() => {
    ST.countdown--;
    const pct = (ST.countdown / (CFG.REFRESH_MS / 1000)) * 100;
    document.getElementById('countdown-fill').style.width = pct + '%';
    document.getElementById('countdown-secs').textContent = ST.countdown + 's';
    if (ST.countdown <= 0) clearInterval(ST.cTimer);
  }, 1000);
}

function scheduleNext() {
  ST.timer = setTimeout(() => refresh().then(scheduleNext), CFG.REFRESH_MS);
}

function manualRefresh() {
  clearTimeout(ST.timer);
  refresh().then(scheduleNext);
}

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
function isStale(row) {
  if (!row.timestamp) return true;
  return Date.now() - new Date(row.timestamp).getTime() > CFG.STALE_MIN * 60_000;
}

function formatAge(d) {
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60)   return `hace ${s}s`;
  if (s < 3600) return `hace ${Math.floor(s / 60)}min`;
  return `hace ${Math.floor(s / 3600)}h`;
}

function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 5000);
}

// ═══════════════════════════════════════════════════
//  INICIO
// ═══════════════════════════════════════════════════
(async () => {
  await loadTraslados();
  await refresh();
  scheduleNext();
})();
</script>
</body>
</html>
