<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.R. Carrozas · Mapa en Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#f5f6f8; --surface:#fff; --border:#e2e5ea;
  --accent:#e63946; --accent2:#c1121f;
  --green:#0b9e8e; --yellow:#d4930a;
  --text:#1a1d23; --muted:#6b7280; --card:#fff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{
  display:flex;align-items:center;gap:14px;padding:10px 18px;
  background:var(--surface);border-bottom:1px solid var(--border);
  z-index:1000;flex-shrink:0;flex-wrap:wrap;
}
.logo-block{display:flex;flex-direction:column;line-height:1}
.logo-brand{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.5px}
.logo-brand span{color:var(--accent)}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.hspacer{flex:1}
.live-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(11,158,142,.1);border:1px solid rgba(11,158,142,.35);
  border-radius:20px;padding:5px 12px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--green);
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.stat-chips{display:flex;gap:8px}
.stat-chip{
  padding:5px 11px;border-radius:20px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  border:1px solid var(--border);background:var(--card);
}
.stat-chip.active{border-color:rgba(230,57,70,.4);color:var(--accent2)}
.stat-chip.idle{color:var(--muted)}
.demo-badge{
  background:rgba(212,147,10,.12);border:1px solid rgba(212,147,10,.35);
  border-radius:20px;padding:5px 11px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--yellow);
  display:none;align-items:center;gap:5px;
}
.demo-badge.visible{display:flex}
.ref-btn{
  display:flex;align-items:center;gap:6px;
  background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:8px;padding:6px 13px;
  font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;
}
.ref-btn:hover{border-color:var(--accent);color:var(--accent)}
.ref-btn.spin svg{animation:rot .6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{
  width:288px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;
}
.sb-hd{
  padding:12px 15px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sb-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.vlist{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.vlist::-webkit-scrollbar{width:4px}
.vlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* VEHICLE CARD */
.vcard{
  background:var(--card);border:1px solid var(--border);
  border-left:3px solid transparent;
  border-radius:10px;padding:13px;cursor:pointer;transition:all .2s;
}
.vcard:hover,.vcard.sel{background:#fff8f8}
.vc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.vc-plate{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px}
.pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.pill-ruta{background:rgba(230,57,70,.14);border:1px solid rgba(230,57,70,.3);color:var(--accent2)}
.pill-off{background:rgba(107,114,128,.09);border:1px solid rgba(107,114,128,.2);color:var(--muted)}
.vc-driver{font-size:12px;color:var(--muted);margin-bottom:4px}
.vc-service{font-size:11px;color:var(--text);opacity:.8;margin-bottom:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-coords{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--green);
  background:rgba(11,158,142,.07);padding:5px 8px;border-radius:5px;
  margin-bottom:7px;display:flex;gap:7px;align-items:center;
}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;animation:blink 2s infinite}
.trail-badge{
  font-family:'DM Mono',monospace;font-size:9px;
  padding:2px 7px;border-radius:4px;margin-bottom:8px;display:inline-block;
}
.vc-meta{display:flex;justify-content:space-between;align-items:flex-end}
.vc-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.vc-prec{font-family:'DM Mono',monospace;font-size:9px;color:var(--yellow);margin-top:2px}
.btn-row{display:flex;gap:4px}
.btn-s{
  font-family:'DM Mono',monospace;font-size:9px;padding:4px 9px;
  border-radius:5px;cursor:pointer;transition:all .2s;letter-spacing:.4px;
  text-transform:uppercase;border:1px solid;
}
.btn-ctr{background:rgba(230,57,70,.1);border-color:rgba(230,57,70,.25);color:var(--accent2)}
.btn-ctr:hover{background:rgba(230,57,70,.2)}
.btn-ton{background:rgba(11,158,142,.08);border-color:rgba(11,158,142,.25);color:var(--green)}
.btn-ton:hover{background:rgba(11,158,142,.18)}
.btn-toff{background:rgba(107,114,128,.07);border-color:rgba(107,114,128,.2);color:var(--muted)}
.btn-toff:hover{background:rgba(107,114,128,.14)}

/* COUNTDOWN */
.cd-bar{
  padding:9px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:9px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
}
.cd-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.cd-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear}

/* MAP */
#map{flex:1;background:#0d1117}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-attribution{display:none!important}
.leaflet-popup-content-wrapper{
  background:var(--surface)!important;border:1px solid var(--border)!important;
  border-radius:10px!important;color:var(--text)!important;
  box-shadow:0 8px 32px rgba(0,0,0,.12)!important;
}
.leaflet-popup-tip{background:var(--surface)!important}
.leaflet-popup-content{margin:13px 15px!important;min-width:200px}
.pp-plate{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px}
.pp-driver{font-size:12px;color:var(--muted);margin-bottom:8px}
.pp-row{display:flex;justify-content:space-between;margin-bottom:4px;gap:8px}
.pp-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap}
.pp-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);text-align:right}
.pp-hr{border:none;border-top:1px solid var(--border);margin:7px 0}

/* TOAST */
#toasts{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:7px;z-index:9999}
.toast{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);
  padding:10px 15px;border-radius:8px;font-size:12px;max-width:260px;
  animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.1);
}
.toast.warn{border-left-color:var(--yellow)}
.toast.err{border-left-color:var(--accent)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;padding:38px 16px;gap:10px;color:var(--muted)}
.empty .ico{font-size:36px;opacity:.4}
.empty p{font-size:12px;text-align:center;line-height:1.65}

/* PULSE */
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(.5);opacity:.9}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-brand"><span>J.R.</span> Carrozas</div>
    <div class="logo-sub">Centro de Control · GPS en Vivo</div>
  </div>
  <div class="hspacer"></div>
  <div class="demo-badge" id="demo-badge">⚠ MODO DEMO</div>
  <div class="stat-chips">
    <div class="stat-chip active" id="chip-active">● 0 activo</div>
    <div class="stat-chip idle"   id="chip-idle">○ 0 sin señal</div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span id="live-lbl">EN VIVO</span>
  </div>
  <button class="ref-btn" id="ref-btn" onclick="manualRefresh()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
    ACTUALIZAR
  </button>
</header>

<div class="app-body">
  <aside>
    <div class="sb-hd">
      <span class="sb-title">Vehículos en Ruta</span>
    </div>
    <div class="vlist" id="vlist">
      <div class="empty"><div class="ico">🛰️</div><p>Cargando GPS…</p></div>
    </div>
    <div class="cd-bar">
      <span>próxima</span>
      <div class="cd-track"><div class="cd-fill" id="cd-fill" style="width:100%"></div></div>
      <span id="cd-secs">20s</span>
    </div>
  </aside>
  <div id="map"></div>
</div>

<div id="toasts"></div>

<script>
// ══════════════════════════════════════════════════
//  CONFIGURACIÓN — cambia solo la URL de tu Apps Script
// ══════════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbx9wr5Od2WgVF2vSSW93OcMmxDoSXs3PLaE7jo44j4rUFElagX4OKNDRy9mqjPpJZWZ/exec";

const CFG = {
  REFRESH_MS: 20_000,
  CENTER:     [4.535, -75.674],   // Armenia, Quindío
  ZOOM:       14,
  STALE_MIN:  5,
  COLORS:     ['#e63946','#2a9d8f','#f4a261','#8338ec','#fb8500','#e9c46a','#06d6a0','#118ab2'],
};

// ══════════════════════════════════════════════════
//  ESTADO — los trails se acumulan en memoria
//  vehicles[id] = { latest, trail[], marker, polyline, startDot, showTrail, color }
// ══════════════════════════════════════════════════
const ST = {
  vehicles: {},
  selected: null,
  cdSecs:   CFG.REFRESH_MS / 1000,
  cdTimer:  null,
  loopTimer: null,
  colorIdx: 0,
  demo:     false,
};

// ══════════════════════════════════════════════════
//  MAPA
// ══════════════════════════════════════════════════
const map = L.map('map', {center: CFG.CENTER, zoom: CFG.ZOOM, preferCanvas: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd', maxZoom:19}).addTo(map);

// ══════════════════════════════════════════════════
//  FETCH hoja de Google Sheets vía GAS
// ══════════════════════════════════════════════════
async function gasGet(sheet) {
  const r = await fetch(`${GAS_URL}?sheetName=${encodeURIComponent(sheet)}`, {redirect:'follow'});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if (j && j.error) throw new Error(j.error);
  return Array.isArray(j) ? j : [];
}

// ══════════════════════════════════════════════════
//  ICONO
// ══════════════════════════════════════════════════
function makeIcon(plate, stale, color) {
  const c = stale ? '#9ca3af' : color;
  const s = stale ? 'rgba(156,163,175,.3)' : `${color}88`;
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;display:flex;flex-direction:column;align-items:center">
      ${!stale ? `<div style="position:absolute;width:56px;height:56px;border-radius:50%;background:${c}28;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 2s ease-out infinite;pointer-events:none"></div>` : ''}
      <div style="width:38px;height:38px;background:${c};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:3px solid #fff;box-shadow:0 3px 14px ${s};z-index:1">⚰️</div>
      <div style="background:rgba(10,12,16,.88);color:#fff;font-family:monospace;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:3px;border:1px solid ${c};letter-spacing:.5px;white-space:nowrap">${plate||'—'}</div>
    </div>`,
    iconSize:[38,56], iconAnchor:[19,28], popupAnchor:[0,-30],
  });
}

// ══════════════════════════════════════════════════
//  DEMO — datos de prueba cuando no hay hoja
// ══════════════════════════════════════════════════
let _da = 0;
function demoRows() {
  _da += 0.02;
  const b = CFG.CENTER;
  return [
    { id_salida:'S-001', placa:'GJX 497', conductor:'Záidar Buitrago', servicio:'Jardines de Armenia',
      lat: String(b[0] + Math.sin(_da)*0.014), lng: String(b[1] + Math.cos(_da)*0.014),
      precision:'8', velocidad:'32', timestamp: new Date().toISOString() },
    { id_salida:'S-002', placa:'ICQ 333', conductor:'Carlos Medina', servicio:'Sepelio Centro',
      lat: String(b[0] + Math.sin(_da+2)*0.009), lng: String(b[1] + Math.cos(_da+2)*0.009),
      precision:'12', velocidad:'0', timestamp: new Date(Date.now()-7*60000).toISOString() },
  ];
}

// ══════════════════════════════════════════════════
//  NORMALIZAR FILA
//  La hoja actual llega como:
//  { id_salida, placa, lat, lng, timestamp, [precision o col extra], [fecha extra] }
//  Esta función lo adapta al formato que usa el mapa
//  sin importar si vienen columnas de más o de menos
// ══════════════════════════════════════════════════
function normalizarFila(r) {
  // lat/lng siempre presentes por nombre
  const lat = parseFloat(r.lat || r.Lat || 0);
  const lng = parseFloat(r.lng || r.Lng || 0);

  // timestamp: puede venir como ISO o como número (epoch ms)
  let ts = r.timestamp || r.Timestamp || r.fecha || r.Fecha || '';
  // Si el valor parece numérico (ej: "100") no es una fecha válida → ignorar
  if (ts && /^\d{1,6}$/.test(String(ts).trim())) ts = '';

  // precision: puede ser la 5ª columna sin nombre claro
  const precision = parseFloat(r.precision || r.Precision || r.accuracy || 0) || 0;
  const velocidad = parseFloat(r.velocidad || r.speed    || r.Velocidad || 0) || 0;

  return {
    id_salida: String(r.id_salida || r.placa || '').trim(),
    placa:     String(r.placa     || '').trim(),
    conductor: String(r.conductor || r.Conductor || '').trim(),
    servicio:  String(r.servicio  || r.motivo   || r.Servicio || '').trim(),
    lat, lng, precision, velocidad,
    timestamp: ts,
  };
}

// ══════════════════════════════════════════════════
//  FETCH GPS  — lee la hoja gps_live
//  Cada fila = última posición de una carroza
//  El recorrido se acumula EN MEMORIA (no necesita gps_historial)
// ══════════════════════════════════════════════════
async function fetchGPS() {
  try {
    const rows = await gasGet('gps_live');
    if (!rows.length) throw new Error('vacía');

    // Desactivar demo
    if (ST.demo) {
      ST.demo = false;
      document.getElementById('demo-badge').classList.remove('visible');
      toast('✓ Conectado a Google Sheets');
    }
    return rows.map(normalizarFila).filter(r => r.lat && r.lng);

  } catch(e) {
    if (!ST.demo) {
      ST.demo = true;
      document.getElementById('demo-badge').classList.add('visible');
      toast('Modo DEMO — la hoja gps_live está vacía o desconectada', 'warn');
    }
    return demoRows();
  }
}

// ══════════════════════════════════════════════════
//  ACTUALIZAR MAPA
//  - Cada llamada recibe la posición ACTUAL de cada carroza
//  - Los puntos anteriores se guardan en ST.vehicles[id].trail
//  - La polilínea se extiende con cada punto nuevo
// ══════════════════════════════════════════════════
function updateMap(rows) {
  const now    = Date.now();
  let active = 0, idle = 0;
  const idsVivos = new Set();

  rows.forEach(raw => {
    const id  = String(raw.id_salida || raw.placa || '').trim();
    const lat = parseFloat(raw.lat);
    const lng = parseFloat(raw.lng);
    if (!id || isNaN(lat) || isNaN(lng)) return;

    idsVivos.add(id);
    const ts    = raw.timestamp ? new Date(raw.timestamp).getTime() : now;
    const stale = (now - ts) > CFG.STALE_MIN * 60_000;
    stale ? idle++ : active++;

    const ll = L.latLng(lat, lng);

    if (!ST.vehicles[id]) {
      // ── PRIMERA VEZ: crear marcador + polilínea vacía ──
      const color    = CFG.COLORS[ST.colorIdx++ % CFG.COLORS.length];
      const polyline = L.polyline([ll], {color, weight:4, opacity:.75}).addTo(map);
      const startDot = L.circleMarker(ll, {
        radius:6, color:'#fff', fillColor:color, fillOpacity:1, weight:2.5,
      }).addTo(map).bindTooltip('Punto de salida', {direction:'top'});
      const marker = L.marker(ll, {
        icon: makeIcon(raw.placa || id, stale, color), zIndexOffset:1000,
      }).addTo(map);

      ST.vehicles[id] = {
        latest: {...raw, lat, lng},
        trail:  [ll],
        marker, polyline, startDot,
        showTrail: true, color,
      };
      bindPopup(id, raw, stale);

    } else {
      const v = ST.vehicles[id];

      // ── AGREGAR PUNTO AL TRAIL si la posición cambió ──
      const ultimo = v.trail[v.trail.length - 1];
      const dist   = map.distance(ultimo, ll);  // metros
      if (dist > 10) {                           // ignorar ruido < 10m
        v.trail.push(ll);
        if (v.showTrail) v.polyline.setLatLngs(v.trail);
      }

      // Animar el marcador al nuevo punto
      animateMarker(v.marker, ultimo, ll, 1500);
      v.marker.setIcon(makeIcon(raw.placa || id, stale, v.color));
      v.latest = {...raw, lat, lng};
      bindPopup(id, raw, stale);

      if (ST.selected === id) map.panTo(ll, {animate:true, duration:.8});
    }
  });

  // Actualizar chips
  document.getElementById('chip-active').textContent = `● ${active} activo${active!==1?'s':''}`;
  document.getElementById('chip-idle').textContent   = `○ ${idle} sin señal`;

  renderSidebar();
}

// ══════════════════════════════════════════════════
//  POPUP
// ══════════════════════════════════════════════════
function bindPopup(id, row, stale) {
  const v   = ST.vehicles[id];
  const lat = parseFloat(row.lat).toFixed(5);
  const lng = parseFloat(row.lng).toFixed(5);
  const age = row.timestamp ? formatAge(new Date(row.timestamp)) : '—';
  const spd = row.velocidad > 0 ? `${Math.round(row.velocidad)} km/h` : 'Detenido';
  v.marker.bindPopup(`
    <div class="pp-plate" style="color:${v.color}">${row.placa || id}</div>
    <div class="pp-driver">👤 ${row.conductor || 'Desconocido'}</div>
    <hr class="pp-hr">
    <div class="pp-row"><span class="pp-lbl">SERVICIO</span><span class="pp-val" style="color:var(--text)">${row.servicio || '—'}</span></div>
    <div class="pp-row"><span class="pp-lbl">ESTADO</span><span class="pp-val">${stale ? '🔴 Sin señal' : '🟢 En ruta'}</span></div>
    <div class="pp-row"><span class="pp-lbl">VELOCIDAD</span><span class="pp-val">${spd}</span></div>
    <div class="pp-row"><span class="pp-lbl">POSICIÓN</span><span class="pp-val">${lat}, ${lng}</span></div>
    <div class="pp-row"><span class="pp-lbl">PRECISIÓN</span><span class="pp-val" style="color:var(--yellow)">±${Math.round(row.precision||0)}m</span></div>
    <div class="pp-row"><span class="pp-lbl">PUNTOS RUTA</span><span class="pp-val">${v.trail.length}</span></div>
    <div class="pp-row"><span class="pp-lbl">ACTUALIZADO</span><span class="pp-val">${age}</span></div>
  `, {maxWidth:240});
}

// ══════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════
function renderSidebar() {
  const el  = document.getElementById('vlist');
  const ids = Object.keys(ST.vehicles);
  if (!ids.length) {
    el.innerHTML = `<div class="empty"><div class="ico">🛰️</div><p>Sin vehículos activos.<br>Verifica la hoja <b>gps_live</b>.</p></div>`;
    return;
  }
  el.innerHTML = ids.map(id => {
    const v     = ST.vehicles[id];
    const row   = v.latest;
    const stale = (Date.now() - new Date(row.timestamp||0).getTime()) > CFG.STALE_MIN*60000;
    const age   = row.timestamp ? formatAge(new Date(row.timestamp)) : '—';
    const pts   = v.trail.length;
    const lat   = parseFloat(row.lat).toFixed(5);
    const lng   = parseFloat(row.lng).toFixed(5);
    const spd   = row.velocidad > 0 ? `${Math.round(row.velocidad)} km/h` : 'Detenido';
    const trOn  = v.showTrail;
    const sel   = ST.selected === id;
    return `
    <div class="vcard${sel?' sel':''}"
         style="border-left-color:${v.color}"
         onclick="selectVehicle('${id}')">
      <div class="vc-top">
        <div class="vc-plate" style="color:${v.color}">${row.placa||id}</div>
        <div class="pill ${stale?'pill-off':'pill-ruta'}">${stale?'SIN SEÑAL':'EN RUTA'}</div>
      </div>
      <div class="vc-driver">🧑 ${row.conductor||'Desconocido'}</div>
      <div class="vc-service">📍 ${row.servicio||'—'} · ⚡ ${spd}</div>
      <div class="vc-coords">
        <div class="cdot" style="background:${v.color}"></div>
        ${lat}, ${lng}
      </div>
      <div class="trail-badge"
           style="background:${v.color}18;border:1px solid ${v.color}40;color:${v.color}">
        🛤 ${pts} punto${pts!==1?'s':''} de ruta registrado${pts!==1?'s':''}
      </div>
      <div class="vc-meta">
        <div>
          <div class="vc-time">⏱ ${age}</div>
          ${row.precision ? `<div class="vc-prec">±${Math.round(row.precision)}m</div>` : ''}
        </div>
        <div class="btn-row">
          <button class="btn-s ${trOn?'btn-ton':'btn-toff'}"
                  onclick="event.stopPropagation();toggleTrail('${id}')">
            🛤 ${trOn?'ON':'OFF'}
          </button>
          <button class="btn-s btn-ctr"
                  onclick="event.stopPropagation();centerOn('${id}')">
            📍 Ir
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
//  CONTROLES
// ══════════════════════════════════════════════════
function selectVehicle(id) {
  ST.selected = ST.selected === id ? null : id;
  renderSidebar();
  if (ST.selected) centerOn(id);
}

function centerOn(id) {
  const v = ST.vehicles[id];
  if (!v) return;
  if (v.showTrail && v.trail.length > 1) {
    map.fitBounds(L.latLngBounds(v.trail).pad(.18), {animate:true, maxZoom:16});
  } else {
    map.flyTo(v.marker.getLatLng(), 15, {animate:true, duration:1.2});
  }
  v.marker.openPopup();
}

function toggleTrail(id) {
  const v = ST.vehicles[id];
  if (!v) return;
  v.showTrail = !v.showTrail;
  if (v.showTrail) {
    v.polyline.setLatLngs(v.trail); v.polyline.addTo(map);
    v.startDot.addTo(map);
  } else {
    v.polyline.setLatLngs([]);
    try { v.startDot.remove(); } catch(e){}
  }
  renderSidebar();
}

// ══════════════════════════════════════════════════
//  ANIMACIÓN MARCADOR
// ══════════════════════════════════════════════════
function animateMarker(marker, from, to, ms) {
  const start = performance.now();
  (function step(now) {
    const t = Math.min(1, (now-start)/ms);
    const e = t<.5 ? 2*t*t : -1+(4-2*t)*t;  // ease in-out
    marker.setLatLng([from.lat+(to.lat-from.lat)*e, from.lng+(to.lng-from.lng)*e]);
    if (t<1) requestAnimationFrame(step);
  })(performance.now());
}

// ══════════════════════════════════════════════════
//  LOOP PRINCIPAL
// ══════════════════════════════════════════════════
async function refresh() {
  const btn = document.getElementById('ref-btn');
  btn.classList.add('spin');
  try {
    const rows = await fetchGPS();
    updateMap(rows);
  } catch(e) {
    toast('Error al actualizar: ' + e.message, 'err');
  }
  btn.classList.remove('spin');
  const t = new Date();
  document.getElementById('live-lbl').textContent =
    'EN VIVO · ' + t.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  resetCD();
}

function resetCD() {
  ST.cdSecs = CFG.REFRESH_MS / 1000;
  clearInterval(ST.cdTimer);
  ST.cdTimer = setInterval(() => {
    ST.cdSecs--;
    const pct = (ST.cdSecs / (CFG.REFRESH_MS/1000)) * 100;
    document.getElementById('cd-fill').style.width  = pct + '%';
    document.getElementById('cd-secs').textContent  = ST.cdSecs + 's';
    if (ST.cdSecs <= 0) clearInterval(ST.cdTimer);
  }, 1000);
}

function scheduleNext() {
  ST.loopTimer = setTimeout(() => refresh().then(scheduleNext), CFG.REFRESH_MS);
}

function manualRefresh() {
  clearTimeout(ST.loopTimer);
  refresh().then(scheduleNext);
}

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
function formatAge(d) {
  const s = Math.floor((Date.now()-d.getTime())/1000);
  if (s < 0)    return 'ahora';
  if (s < 60)   return `hace ${s}s`;
  if (s < 3600) return `hace ${Math.floor(s/60)}min`;
  return `hace ${Math.floor(s/3600)}h`;
}

function toast(msg, type='info') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 5500);
}

// ══════════════════════════════════════════════════
//  INICIO
// ══════════════════════════════════════════════════
refresh().then(scheduleNext);
</script>
