<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Registro de Llegada</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde: #15803d; --verde-claro: #f0fdf4; --verde-borde: #86efac;
            --azul: #004a99; --azul-cielo: #e3f2fd;
            --blanco: #ffffff; --gris: #546e7a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--verde-claro); font-family: 'DM Sans', sans-serif; color: #14532d; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(21,128,61,0.12); overflow: hidden; }
        .header { background: var(--verde); color: var(--blanco); padding: 20px; text-align: center; }
        .header h2 { font-size: 18px; }
        .header p  { font-size: 11px; opacity: 0.8; font-weight: bold; margin-top: 4px; }
        .content { padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gris); margin: 20px 0 10px; padding-bottom: 5px; font-weight: 700; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #dcfce7; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--verde); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 2px solid #dcfce7; border-radius: 10px; font-family: inherit; color: #14532d; background: #f9fef9; font-size: 14px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--verde); }
        input[readonly] { background: #eefff4; font-weight: bold; color: var(--verde); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .total-km-card {
            background: #f0fdf4; border: 2px solid #86efac;
            border-radius: 14px; padding: 14px 18px;
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 12px;
        }
        .total-km-card .km-icon { font-size: 28px; }
        .total-km-card .km-info { flex: 1; }
        .total-km-card .km-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--gris); letter-spacing: 1px; }
        .total-km-card .km-valor { font-size: 28px; font-weight: 700; color: var(--verde); line-height: 1.2; }
        .total-km-card .km-sub   { font-size: 11px; color: #4ade80; margin-top: 2px; }

        .estado-selector { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .estado-opcion {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; border-radius: 12px;
            border: 2px solid #dcfce7; cursor: pointer;
            transition: all 0.2s ease; background: #f9fef9;
        }
        .estado-opcion:hover { border-color: #86efac; background: #f0fdf4; }
        .estado-opcion input[type="radio"] { display: none; }
        .estado-opcion .est-icono { font-size: 22px; flex-shrink: 0; }
        .estado-opcion .est-texto { flex: 1; }
        .estado-opcion .est-titulo { font-size: 13px; font-weight: 700; color: #14532d; }
        .estado-opcion .est-desc   { font-size: 11px; color: var(--gris); margin-top: 2px; }
        .estado-opcion .est-check  { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #86efac; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }

        .estado-opcion.sel-orden   { border-color: #16a34a; background: #f0fdf4; }
        .estado-opcion.sel-orden   .est-check { background: #16a34a; border-color: #16a34a; }
        .estado-opcion.sel-orden   .est-check::after { content: '✓'; color: white; font-size: 11px; font-weight: 900; }
        .estado-opcion.sel-novedad { border-color: #d97706; background: #fffbeb; }
        .estado-opcion.sel-novedad .est-check { background: #d97706; border-color: #d97706; }
        .estado-opcion.sel-novedad .est-check::after { content: '!'; color: white; font-size: 11px; font-weight: 900; }
        .estado-opcion.sel-averia  { border-color: #dc2626; background: #fef2f2; }
        .estado-opcion.sel-averia  .est-check { background: #dc2626; border-color: #dc2626; }
        .estado-opcion.sel-averia  .est-check::after { content: '✗'; color: white; font-size: 11px; font-weight: 900; }

        .acciones { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-finalizar { width: 100%; padding: 18px; border: none; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; background: var(--verde); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 16px rgba(21,128,61,0.3); transition: 0.2s; font-family: inherit; }
        .btn-finalizar:active   { transform: scale(0.98); }
        .btn-finalizar:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
        .btn-wa    { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; background: #25D366; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; font-family: inherit; }
        .btn-volver { width: 100%; padding: 13px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-weight: 600; font-size: 14px; cursor: pointer; background: transparent; color: #94a3b8; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-family: inherit; }

        #progreso-steps { display:none; background:#f0fdf4; border:1px solid #86efac; border-radius:12px; padding:12px 15px; margin-bottom:14px; font-size:12px; }
        #progreso-steps div { padding: 3px 0; color: #546e7a; }
        #progreso-steps div.ok  { color: #15803d; font-weight: 700; }
        #progreso-steps div.err { color: #dc2626; font-weight: 700; }
        #progreso-steps div.act { color: #004a99; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏁 REGISTRO DE LLEGADA</h2>
        <p id="conductor-header">CARGANDO...</p>
    </div>

    <div class="content">

        <div class="section-title">Vehículo que Regresa</div>
        <div class="grid-2">
            <div>
                <label>Placa de la Carroza</label>
                <select id="placa" onchange="alSeleccionarPlaca()">
                    <option value="">Elija placa...</option>
                </select>
            </div>
            <div>
                <label>Recibido Por</label>
                <input type="text" id="recibido_por" readonly style="background:#eefff4; font-weight:bold;">
            </div>
        </div>

        <div class="section-title">📍 Kilometraje y Hora de Llegada</div>
        <div class="grid-2">
            <div>
                <label>Hora de Entrada</label>
                <input type="time" id="hora_ingreso">
            </div>
            <div>
                <label>KM al Llegar</label>
                <input type="number" id="km_ingreso" placeholder="Ej: 155280" oninput="calcularTotal()">
            </div>
        </div>

        <label>Total KM Recorridos</label>
        <div class="total-km-card" id="total-km-card">
            <div class="km-icon">🛣️</div>
            <div class="km-info">
                <div class="km-label">Kilómetros del servicio</div>
                <div class="km-valor" id="total-km-display">— KM</div>
                <div class="km-sub" id="km-sub-info">Ingresa KM de llegada para calcular</div>
            </div>
        </div>
        <input type="number" id="total_km" readonly style="display:none;">

        <div class="section-title">Estado de Entrega</div>
        <div class="estado-selector">

            <label class="estado-opcion" id="est-orden" onclick="seleccionarEstado('orden')">
                <input type="radio" name="estado" value="Todo En Orden">
                <div class="est-icono">✅</div>
                <div class="est-texto">
                    <div class="est-titulo">Todo en orden</div>
                    <div class="est-desc">La carroza regresa en perfectas condiciones</div>
                </div>
                <div class="est-check" id="check-orden"></div>
            </label>

            <label class="estado-opcion" id="est-novedad" onclick="seleccionarEstado('novedad')">
                <input type="radio" name="estado" value="Con Novedad">
                <div class="est-icono">⚠️</div>
                <div class="est-texto">
                    <div class="est-titulo">Con novedad</div>
                    <div class="est-desc">Algún detalle menor a reportar en observaciones</div>
                </div>
                <div class="est-check" id="check-novedad"></div>
            </label>

            <label class="estado-opcion" id="est-averia" onclick="seleccionarEstado('averia')">
                <input type="radio" name="estado" value="Con Avería">
                <div class="est-icono">🔧</div>
                <div class="est-texto">
                    <div class="est-titulo">Con avería</div>
                    <div class="est-desc">Falla mecánica o daño — describe en observaciones</div>
                </div>
                <div class="est-check" id="check-averia"></div>
            </label>

        </div>

        <label>Observaciones Finales</label>
        <textarea id="observaciones" rows="3" placeholder="¿Alguna novedad en el servicio?"></textarea>

        <div id="progreso-steps">
            <div id="step-carroza">⏳ Actualizando estado de carroza...</div>
            <div id="step-llegada">⏳ Guardando registro de llegada...</div>
        </div>

        <div class="acciones">
            <button class="btn-finalizar" id="btn-finalizar" onclick="finalizarServicio()">
                🏁 FINALIZAR SERVICIO
            </button>
            <div id="bloque-wa" style="display:none;">
                <button class="btn-wa" onclick="enviarWA()">💬 ENVIAR REPORTE POR WHATSAPP</button>
            </div>
            <button class="btn-volver" onclick="irAtras()">← Volver</button>
        </div>

    </div>
</div>

<script src="db.js"></script>
<script>
    let flotaCompleta      = [];
    let estadoSeleccionado = '';
    let datosFinales       = {};

    // ── INIT ──────────────────────────────────────────────
    window.onload = async () => {
        const sesionData = localStorage.getItem('usuario_sesion');
        if (!sesionData) { window.location.href = "index.html"; return; }
        const user = JSON.parse(sesionData);
        document.getElementById('recibido_por').value = user.nombre;
        document.getElementById('conductor-header').innerText = 'BIENVENIDO, ' + user.nombre.split(' ')[0].toUpperCase();

        const now = new Date();
        document.getElementById('hora_ingreso').value =
            now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

        await cargarPlacas();
    };

    // ── CARGAR PLACAS ─────────────────────────────────────
    async function cargarPlacas() {
        const select = document.getElementById('placa');
        try {
            const res = await DB.obtenerFlota();
            flotaCompleta = (res.data || []);

            const enServicio = flotaCompleta.filter(c => (c.estado || '').includes('Servicio'));
            const lista = enServicio.length > 0 ? enServicio : flotaCompleta;

            select.innerHTML = '<option value="">Elija placa...</option>' +
                lista.map(c =>
                    '<option value="' + c.placa + '">' + c.placa + ' — ' + (c.modelo || 'S/M') +
                    (enServicio.length === 0 ? ' (' + (c.estado || '?') + ')' : '') + '</option>'
                ).join('');
        } catch(e) {
            select.innerHTML = '<option>Error al cargar placas</option>';
        }
    }

    // ── AL ELEGIR PLACA (CORREGIDA) ────────────────────────
    async function alSeleccionarPlaca() {
        const placa = document.getElementById('placa').value;
        const subInfo = document.getElementById('km-sub-info');
        window._kmSalidaActivo = 0;

        if (!placa) {
            subInfo.innerText = 'Selecciona la placa para calcular automáticamente';
            calcularTotal();
            return;
        }

        subInfo.innerText = '🔍 Buscando datos de salida...';

        try {
            const res = await DB.obtenerTrasladosRecientes(200);
            const todos = res.data || [];
            const activo = todos.find(r =>
                String(r.placa || '').trim().toUpperCase() === placa.trim().toUpperCase() &&
                (!r.km__ingreso || String(r.km__ingreso).trim() === '')
            );

            if (activo) {
                // Leer km__salida (doble guion) o km_salida (un guion) según tu base de datos
                window._kmSalidaActivo = parseFloat(activo.km__salida || activo.km_salida || 0);
                subInfo.innerText = 'KM salida: ' + window._kmSalidaActivo.toLocaleString('es-CO') +
                    ' | Hora salida: ' + (activo.hora_de_salida || '--');
                window._idSalidaActivo = activo.id_salida || '';
            } else {
                subInfo.innerText = 'No se encontró traslado activo para esta placa';
            }
        } catch(e) {
            subInfo.innerText = 'Error al obtener datos de salida';
        }
        calcularTotal();
    }

    // ── CÁLCULO TOTAL KM (CORREGIDA) ───────────────────────
    function calcularTotal() {
        const kmI = parseFloat(document.getElementById('km_ingreso').value) || 0;
        const kmS = window._kmSalidaActivo || 0;
        const display = document.getElementById('total-km-display');
        const card = document.getElementById('total-km-card');
        const hiddenTotal = document.getElementById('total_km');

        if (kmI > 0 && kmS > 0) {
            const total = kmI - kmS;
            if (total >= 0) {
                display.innerText = total.toLocaleString('es-CO') + ' KM';
                hiddenTotal.value = total.toFixed(1);
                card.style.borderColor = '#16a34a';
            } else {
                display.innerText = 'Error: KM menor';
                card.style.borderColor = '#dc2626';
            }
        } else {
            display.innerText = '— KM';
            card.style.borderColor = '#86efac';
        }
    }

    // ── ESTADO DE ENTREGA ─────────────────────────────────
    function seleccionarEstado(valor) {
        estadoSeleccionado = valor;
        ['orden','novedad','averia'].forEach(v => {
            document.getElementById('est-' + v).classList.remove('sel-orden','sel-novedad','sel-averia');
            document.getElementById('check-' + v).innerHTML = '';
        });
        document.getElementById('est-' + valor).classList.add('sel-' + valor);
    }

    function setStep(id, estado, texto) {
        const el = document.getElementById(id);
        if (el) { el.className = estado; el.innerText = texto; }
    }

    // ── FINALIZAR SERVICIO ────────────────────────────────
    async function finalizarServicio() {
        const btn   = document.getElementById('btn-finalizar');
        const placa = document.getElementById('placa').value;
        const kmI   = document.getElementById('km_ingreso').value;
        const hora  = document.getElementById('hora_ingreso').value;

        if (!placa) { alert("Selecciona la placa"); return; }
        if (!kmI)   { alert("Ingresa el KM de llegada"); return; }
        if (!estadoSeleccionado) { alert("Selecciona el estado de entrega"); return; }

        btn.disabled  = true;
        btn.innerText = "⏳ GUARDANDO...";
        document.getElementById('progreso-steps').style.display = 'block';

        const etiquetaEstado = {
            'orden':   'Todo En Orden ✅',
            'novedad': 'Con Novedad ⚠️',
            'averia':  'Con Avería 🔧'
        }[estadoSeleccionado];

        datosFinales = {
            placa,
            hora_ingreso:   hora,
            km_ingreso:     kmI,
            total_km:       document.getElementById('total_km').value,
            estado_entrega: etiquetaEstado,
            observaciones:  document.getElementById('observaciones').value,
            recibido_por:   document.getElementById('recibido_por').value,
        };

        // Paso 1: Carroza
        setStep('step-carroza', 'act', '⏳ Actualizando estado de carroza...');
        try {
            await DB.actualizarCarroza(placa, {
                estado: 'Disponible',
                kilometraje_actual: parseInt(kmI) || 0
            });
            setStep('step-carroza', 'ok', '✅ Carroza marcada como Disponible');
        } catch(e) {
            setStep('step-carroza', 'ok', '⚠️ Carroza: se omitió (no crítico)');
        }

        // Paso 2: Registro
        setStep('step-llegada', 'act', '⏳ Guardando registro de llegada...');
        try {
            const res = await DB.guardarLlegada(datosFinales);
            if (!res.ok) throw new Error(res.error || 'Error al guardar');

            if (window._idSalidaActivo) {
                await DB.actualizar('Traslado', 
                    { km__ingreso: parseInt(kmI), hora_de_ingreso: hora }, 
                    'id_salida', window._idSalidaActivo
                );
            }

            setStep('step-llegada', 'ok', '✅ Llegada registrada correctamente');
            btn.innerText = "✓ SERVICIO FINALIZADO";
            btn.style.background = "#16a34a";
            document.getElementById('bloque-wa').style.display = 'block';
        } catch(e) {
            setStep('step-llegada', 'err', '❌ Error: ' + e.message);
            btn.disabled = false;
            btn.innerText = "🏁 REINTENTAR";
        }
    }

  // ── WHATSAPP (CON FORMATO MEJORADO) ──────────────────
    function enviarWA() {
        // Lógica de saludo dinámico
        const horaActual = new Date().getHours();
        let saludo = "";
        if (horaActual >= 6 && horaActual < 12) saludo = "Buenos Días ☀️";
        else if (horaActual >= 12 && horaActual < 18) saludo = "Buenas Tardes 🌤️";
        else saludo = "Buenas Noches 🌙";

        const msg = saludo + "\n\n" +
            "🏁 *Reporte de Llegada De Carroza*\n\n" +
            "*Placa:* "          + datosFinales.placa          + "\n" +
            "*Hora Llegada:* "   + datosFinales.hora_ingreso   + "\n" +
            "*KM Ingreso:* "     + parseInt(datosFinales.km_ingreso).toLocaleString('es-CO') + "\n" +
            "*Total KM:* "       + datosFinales.total_km       + " km\n" +
            "*Estado Entrega:* " + datosFinales.estado_entrega + "\n" +
            "*Recibido Por:* "   + datosFinales.recibido_por   + "\n\n" +
            "📝 *Observaciones:* "  + (datosFinales.observaciones || 'Sin novedades') + "\n\n" +
            "✅ *Servicio completado exitosamente* 🙏";

        window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
    }

    // ── VOLVER (CORREGIDA) ────────────────────────────────
    function irAtras() {
        const user = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
        const norm = s => (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        const rol  = norm(user.rol);
        const usr  = norm(user.usuario);
        if (rol === 'admin' || rol === 'administracion' || usr === 'admin') window.location.href = "dashboard.html";
        else if (rol === 'coordinador') window.location.href = "panel_coordinador.html";
        else window.location.href = "panel_conductor.html";
    }
</script>
<script src="config-aplicar.js"></script>
</body>
</html>
